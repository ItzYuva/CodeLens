version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/app/data/codelens.db
    volumes:
      - ./backend:/app/backend
      - app_data:/app/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python backend/workers/run_worker.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/app/data/codelens.db
    volumes:
      - ./backend:/app/backend
      - app_data:/app/data
    depends_on:
      - redis

volumes:
  app_data:
