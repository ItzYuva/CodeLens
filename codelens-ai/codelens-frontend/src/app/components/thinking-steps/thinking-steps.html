@if (steps.length > 0) {
  <div class="thinking-container">
    @for (step of steps; track step.message) {
      <div class="thinking-step">{{ step.message }}</div>
    }
    @if (isActive) {
      <div class="thinking-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    }
  </div>
}
