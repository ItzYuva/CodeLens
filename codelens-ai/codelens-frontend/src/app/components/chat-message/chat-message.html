@if (message.role === 'user') {
  <div class="flex justify-end mb-4 animate-fade-in">
    <div class="user-bubble">
      {{ message.content }}
    </div>
  </div>
} @else {
  <div class="assistant-message mb-6 animate-fade-in">
    <app-thinking-steps
      [steps]="message.thinkingSteps"
      [isActive]="message.isStreaming && message.content.length === 0"
    />

    @if (message.content) {
      <div class="prose prose-invert max-w-none" [innerHTML]="renderedHtml"></div>
      @if (message.isStreaming) {
        <span class="streaming-cursor">|</span>
      }
    }

    @if (!message.isStreaming) {
      <app-source-references
        [sources]="message.sources"
        [repoUrl]="repoUrl"
      />
    }
  </div>
}
