<!-- Header -->
<div class="chat-header">
  <button class="back-btn" (click)="goBack()">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back
  </button>
  @if (repo) {
    <span class="repo-name">{{ repo.name }}</span>
    <button class="github-link" (click)="openGithub()">GitHub</button>
  }
</div>

<!-- Connection banner -->
@if (connectionStatus === 'disconnected') {
  <div class="connection-banner">
    Disconnected from server. Attempting to reconnect...
  </div>
}

<!-- Chat area -->
<div class="chat-area" #messagesContainer>
  <!-- Suggested questions (when no messages) -->
  @if (messages.length === 0) {
    <div class="suggestions">
      <p class="suggestions-label">Suggested questions:</p>
      <div class="suggestions-list">
        @for (q of suggestedQuestions; track q) {
          <button class="suggestion-btn" (click)="sendQuery(q)">
            {{ q }}
          </button>
        }
      </div>
    </div>
  }

  <!-- Messages -->
  @for (msg of messages; track trackMessage($index, msg)) {
    <app-chat-message
      [message]="msg"
      [repoUrl]="repo?.url || ''"
    />
  }
</div>

<!-- Input -->
<div class="chat-input-area">
  <div class="input-wrapper">
    <textarea
      #queryInput
      [(ngModel)]="query"
      placeholder="Ask about this codebase..."
      (keydown)="onKeydown($event)"
      [disabled]="isStreaming || connectionStatus !== 'connected'"
      rows="1"
      class="query-textarea"
    ></textarea>
    <button
      class="send-btn"
      (click)="sendQuery()"
      [disabled]="!query.trim() || isStreaming || connectionStatus !== 'connected'"
    >
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 9L16 2L9 16L7.5 10.5L2 9Z" fill="currentColor"/>
      </svg>
    </button>
  </div>
</div>
